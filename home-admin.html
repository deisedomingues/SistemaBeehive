<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beehive | Área Admin</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="overlay"></div>

  <main class="container home-admin-page">
    <div class="topo-acoes-admin">
      <button id="btnSair" class="btn-sair-admin" type="button">
        Sair
      </button>
    </div>

    <img src="images/logo.png" alt="Beehive Escola de Idiomas" class="logo logo-admin-centralizada">

    <section class="cabecalho-admin-central">
      <h1 id="tituloAdmin">Área Administrativa</h1>
      <p class="subtitulo-admin">
        Escolha qual departamento deseja acessar.
      </p>
    </section>

    <section class="painel-admin-cards painel-admin-departamentos">

      <a href="home-pedagogico.html" class="card-admin-link">
        <article class="card-admin card-admin-departamento">
          <div class="card-admin-icone">📚</div>
          <div class="card-admin-conteudo">
            <h2>Área Pedagógica</h2>
            <p>
              Acesse cadastros, matrículas, relatórios, reposições, eventos e acompanhamentos acadêmicos.
            </p>
          </div>
        </article>
      </a>

      <a href="home-financeiro.html" class="card-admin-link">
        <article class="card-admin card-admin-departamento">
          <div class="card-admin-icone">💰</div>
          <div class="card-admin-conteudo">
            <h2>Área Financeira</h2>
            <p>
              Acesse controles financeiros, hora-aula, pagamentos, valores fixos e resumos de fechamento.
            </p>
          </div>
        </article>
      </a>

    </section>
  </main>

  <script type="module" src="js/home-admin.js"></script>
</body>
</html>
