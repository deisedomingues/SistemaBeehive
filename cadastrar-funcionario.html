<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Cadastrar Funcionário | Beehive</title>
  <link rel="stylesheet" href="css/style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>

  <div class="overlay"></div>

  <main class="container container-resumo">

    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:16px;">
      <div>
        <h1 style="margin-bottom:6px;">Cadastrar funcionário</h1>
        <p style="margin:0; opacity:0.9;">
          Registre os dados dos funcionários administrativos da Beehive.
        </p>
      </div>

      <a href="menu-cadastros.html" class="btn-secundario" style="text-decoration:none;">
        Voltar
      </a>
    </div>

    <div id="msg" style="display:none; margin-bottom:12px;"></div>

    <section class="card">
      <form id="formFuncionario">

        <div class="form-grid">
          <div>
            <label for="nome">Nome *</label>
            <input type="text" id="nome" required placeholder="Ex.: Sergio" />
          </div>

          <div>
            <label for="emailInstitucional">E-mail institucional</label>
            <input type="email" id="emailInstitucional" placeholder="Ex.: secretaria@..." />
          </div>

          <div>
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" placeholder="Ex.: (11) 99999-9999" />
          </div>

          <div>
            <label for="dataNascimento">Data de nascimento</label>
            <input type="date" id="dataNascimento" />
          </div>

          <div>
            <label for="dataAdmissao">Data de admissão</label>
            <input type="date" id="dataAdmissao" />
          </div>

          <div>
            <label for="ativo">Status</label>
            <select id="ativo">
              <option value="true">Ativo</option>
              <option value="false">Inativo</option>
            </select>
          </div>
        </div>

        <div style="margin-top:14px;">
          <label for="observacao">Observações</label>
          <textarea id="observacao" rows="4" placeholder="Informações adicionais sobre o funcionário..."></textarea>
        </div>

        <div style="display:flex; justify-content:flex-end; gap:10px; flex-wrap:wrap; margin-top:18px;">
          <button type="reset" class="btn-secundario">
            Limpar
          </button>

          <button type="submit" class="btn">
            Salvar funcionário
          </button>
        </div>

      </form>
    </section>

  </main>

  <script src="js/supabaseClient.js"></script>
  <script src="js/guard.js"></script>
  <script src="js/cadastrar-funcionarios.js"></script>
</body>
</html>
