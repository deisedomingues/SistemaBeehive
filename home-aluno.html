<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Beehive | Área do Aluno</title>
  <link rel="stylesheet" href="css/style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <div class="overlay"></div>

  <main class="container">

    <h1>Área do Aluno</h1>

    <img src="images/logo.png" alt="Beehive Escola de Idiomas" class="logo">

    <div class="saudacao-container">
      <p id="saudacao" class="saudacao"></p>
      <img src="images/AbelhinhaBranca.png" alt="Abelhinha" class="icone-saudacao">
    </div>


    <div class="buttons">

      <a href="agendar_reposicao.html" class="btn">
        Agendar Reposição
      </a>

    </div>


    <div class="info-aluno">

      <h3>Informações</h3>

      <p>
        • O agendamento de reposição deve ser feito com antecedência.
      </p>

      <p>
        • Cancelamentos só podem ser feitos com até 24h antes da aula.
      </p>

      <p>
        • Em caso de dúvidas, entre em contato com a escola.
      </p>

    </div>


    <div style="text-align:right; margin-top:20px;">
      <button
        id="btnSair"
        style="
          background: transparent;
          border: 1px solid #F1BC32;
          padding: 6px 12px;
          border-radius: 8px;
          cursor: pointer;
          font-size: 12px;
        "
      >
        Sair
      </button>
    </div>

  </main>

  <script type="module" src="js/home-aluno.js"></script>

</body>
</html>
