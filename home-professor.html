<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Beehive | Área do Professor</title>
  <link rel="stylesheet" href="css/style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <div class="overlay"></div>

  <main class="container home-professor-page">

    <div class="topo-acoes-professor">
      <button id="btnSair" class="btn-sair-admin" type="button">
        Sair
      </button>
    </div>

    <img
      src="images/logo.png"
      alt="Beehive Escola de Idiomas"
      class="logo logo-professor-centralizada"
    >

    <section class="cabecalho-professor-central">
      <p class="rotulo-admin">Área do professor</p>
      <h1 id="tituloProfessor">Área do Professor</h1>

      <div class="saudacao-card saudacao-card-professor">
        <div class="saudacao-card-texto">
          <p id="saudacao" class="saudacao saudacao-professor"></p>
          <p class="subtitulo-admin subtitulo-professor">
            Escolha uma opção para continuar no sistema.
          </p>
        </div>

        <img
          src="images/AbelhinhaBranca.png"
          alt="Abelhinha"
          class="icone-saudacao-professor"
        >
      </div>
    </section>

    <section class="painel-professor-cards">

      <a href="registrar-aula.html" class="card-admin-link">
        <article class="card-admin card-professor">
          <div class="card-admin-icone">📝</div>
          <div class="card-admin-conteudo">
            <h2>Registrar aula</h2>
            <p>
              Lance presença, ausência, cancelamento e demais informações da aula.
            </p>
          </div>
        </article>
      </a>

      <a href="resumo-professor.html" class="card-admin-link">
        <article class="card-admin card-professor">
          <div class="card-admin-icone">📊</div>
          <div class="card-admin-conteudo">
            <h2>Resumo</h2>
            <p>
              Visualize seu acompanhamento acadêmico e informações gerais dos alunos.
            </p>
          </div>
        </article>
      </a>

    </section>

  </main>

  <script type="module" src="js/home-professor.js"></script>
</body>
</html>
