<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Editar Matrículas | Beehive</title>
  <link rel="stylesheet" href="css/style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <div class="overlay"></div>

  <main class="container container-resumo">
    <h1>Editar Matrículas</h1>

    <div id="msg" style="display:none;"></div>

    <!-- CARD 1 -->
    <section class="card" style="margin-bottom:16px;">
      <h2>1) Escolha o aluno</h2>

      <form class="form" style="margin-top:10px;">
        <label for="selectAluno">
          Aluno
          <select id="selectAluno">
            <option value="">Carregando alunos...</option>
          </select>
        </label>
      </form>
    </section>

    <!-- CARD 2 -->
    <section class="card">
      <h2>2) Gerenciar matrícula</h2>

      <div id="resumoAluno" style="display:none; margin-top:12px; margin-bottom:16px; padding:12px; border-radius:10px; background:rgba(255,255,255,0.45);">
        <p style="margin:0; font-size:14px;">
          <strong>Aluno selecionado:</strong>
          <span id="nomeAlunoResumo">—</span>
        </p>
      </div>

      <div>
        <label for="selectMatricula">
         Selecione abaixo o curso que deseja gerenciar ou clique em "adicionar curso" para matricular o aluno em outra disciplina.
          <select id="selectMatricula" disabled>
            <option value="">Selecione um aluno acima</option>
          </select>
        </label>

        <p id="infoCursosAluno" style="font-size:13px; opacity:0.85; margin-top:8px;"></p>

        <div style="display:flex; justify-content:flex-end; margin-top:10px;">
          <button
            type="button"
            class="btn"
            id="btnAddCurso"
            style="padding:10px 14px; font-size:13px;"
          >
            + Adicionar curso
          </button>
        </div>
      </div>

      <!-- BLOCO PARA MATRÍCULA ATIVA -->
      <div id="blocoEdicao" style="display:none; margin-top:20px; padding-top:18px; border-top:1px solid rgba(0,0,0,0.08);">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; margin-bottom:10px;">
          <div>
            <h3 id="tituloEdicao" style="margin:0; font-size:17px; color:#5c4300;">Editar matrícula</h3>
            <p id="subtituloEdicao" style="margin:4px 0 0 0; font-size:13px; opacity:0.85;">—</p>
          </div>

          <button
            type="button"
            id="btnDesmatricular"
            style="display:none; border:none; cursor:pointer; padding:10px 14px; border-radius:10px; font-weight:bold; background:#ffebee; color:#b71c1c;"
          >
            Desmatricular este curso
          </button>
        </div>

        <form class="form" id="formEditar" style="margin-top:10px;">
          <label for="materia">
            Matéria
            <select id="materia" disabled>
              <option value="">—</option>
            </select>
          </label>

          <label for="modulo">
            Módulo
            <select id="modulo" disabled>
              <option value="">Selecione uma matrícula</option>
            </select>
          </label>

          <label for="professor">
            Professor
            <select id="professor" disabled>
              <option value="">Selecione uma matrícula</option>
            </select>
          </label>

          <div style="font-size:13px; opacity:0.85; margin-top:2px;">
            <span id="infoMatricula">—</span>
          </div>

          <button type="submit" class="btn" id="btnSalvar" disabled>
            Salvar alterações
          </button>
        </form>
      </div>

      <!-- BLOCO PARA MATRÍCULA DESMATRICULADA -->
      <!-- BLOCO PARA CURSO DESATIVADO -->
<div id="blocoRematricula" style="display:none; margin-top:20px; padding-top:18px; border-top:1px solid rgba(0,0,0,0.08);">
  <div
    id="caixaRematricula"
    style="
      background:#fff8e8;
      border:1px solid #f1d98a;
      border-radius:12px;
      padding:16px;
    "
  >
    <h3 style="margin:0 0 10px 0; font-size:17px; color:#8b6a00;">
      Curso desativado
    </h3>

    <p id="textoRematricula" style="font-size:14px; line-height:1.5; margin-bottom:10px;">
      —
    </p>

    <p id="infoMatriculaInativa" style="font-size:13px; line-height:1.5; opacity:0.9; margin-bottom:14px;">
      —
    </p>

    <button type="button" class="btn" id="btnRematricular">
      Rematricular este curso
    </button>
  </div>
</div>

    <a href="home-admin.html" class="link-voltar">← Voltar</a>
  </main>

  <script type="module" src="js/editar-matriculas.js"></script>
</body>
</html>
