<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Editar Matrículas | Beehive</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="overlay"></div>

  <main class="container container-resumo">
    <h1>Editar Matrículas</h1>

    <!-- Mensagem pequena (sem popup) -->
    <div id="msg" style="display:none; margin-bottom:10px;"></div>

    <!-- 1) Escolher aluno -->
    <div class="card" style="margin-bottom:14px;">
      <h2>1) Escolha o aluno</h2>

      <form class="form" style="margin-top:10px;">
        <label>
          Aluno
          <select id="selectAluno">
            <option value="">Carregando alunos...</option>
          </select>
        </label>
      </form>
    </div>

    <!-- 2) Escolher matrícula do aluno -->
    <div class="card" style="margin-bottom:14px;">
      <h2>2) Escolha o curso (matrícula)</h2>

      <form class="form" style="margin-top:10px;">
        <label>
          Matrículas do aluno
          <select id="selectMatricula" disabled>
            <option value="">Selecione um aluno acima</option>
          </select>
        </label>

        <div style="display:flex; justify-content:flex-end; margin-top:8px;">
  <button type="button" class="btn" id="btnAddCurso" style="padding:8px 10px; font-size:12px; background:#FFF5CC;">
    + Adicionar curso
  </button>
</div>

        <p id="infoMatricula" style="font-size:12px; opacity:0.85; margin-top:-6px;"></p>
      </form>
    </div>

    <!-- 3) Editar dados da matrícula -->
    <div class="card">
      <h2>3) Editar</h2>

      <form class="form" id="formEditar" style="margin-top:10px;">
        <label>
          Matéria
          <select id="materia" disabled>
            <option value="">—</option>
          </select>
        </label>

        <label>
          Módulo
          <select id="modulo" disabled>
            <option value="">Selecione uma matrícula</option>
          </select>
        </label>

        <label>
          Professor
          <select id="professor" disabled>
            <option value="">Selecione uma matrícula</option>
          </select>
        </label>

        <label style="display:flex; flex-direction:row; gap:10px; align-items:center; margin-top:6px;">
          <input type="checkbox" id="ativa" checked />
          Matrícula ativa
        </label>

        <button type="submit" class="btn" id="btnSalvar" disabled>
          Salvar alterações
        </button>
      </form>
    </div>

    <a href="home-admin.html" class="link-voltar">← Voltar</a>
  </main>

  <script type="module" src="js/editar-matriculas.js"></script>
</body>
</html>
