<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Reposição | Beehive</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="overlay"></div>

    <main class="container container-reposicao">

        <h1>Agendar reposição</h1>

        <section class="card-reposicao">
            <h3>Reposições pendentes</h3>
            <p class="texto-apoio">
                Selecione abaixo a aula que você deseja repor.
            </p>

            <div id="faltasAluno">Carregando...</div>
        </section>

        <section class="card-reposicao">
            <h3>Horários disponíveis</h3>
            <p class="texto-apoio" id="textoSelecao">
                Escolha uma aula pendente para visualizar os horários disponíveis.
            </p>

            <div id="listaReposicoes">Carregando horários...</div>
        </section>

        <p id="msg"></p>

        <a href="home-aluno.html" class="link-voltar">
            ← Voltar
        </a>

    </main>

    <script type="module" src="js/agendar_reposicao.js"></script>

</body>

</html>
