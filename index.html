<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Beehive | Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- camada de fundo -->
  <div class="overlay"></div>

  <!-- abelhinhas decorativas -->
  <img src="images/AbelhinhaAmarela.png" alt="" class="bee bee-top-left">
  <img src="images/AbelhinhaAmarela.png" alt="" class="bee bee-bottom-right">

  <main class="container">

    <!-- logo -->
    <img src="images/logo.png" alt="Beehive Escola de Idiomas" class="logo">

    <!-- mensagem de boas-vindas -->
    <h1 style="font-size:20px; margin-bottom:6px;">
      Seja bem-vindo(a)!
    </h1>

    <p style="font-size:14px; margin-bottom:18px; color:#333;">
      Faça login para continuar
    </p>

    <!-- mensagem do sistema -->
    <div id="msg" style="display:none; margin-bottom:10px;"></div>

    <!-- formulário -->
    <form class="form" id="form-login">

      <label style="margin-bottom:10px;">
        E-mail
        <input
          type="email"
          id="email"
          required
          placeholder="Digite seu e-mail"
          style="padding:10px;"
        >
      </label>

      <label style="margin-bottom:14px;">
        Senha
        <input
          type="password"
          id="senha"
          required
          placeholder="Digite sua senha"
          style="padding:10px;"
        >
      </label>

      <button type="submit" class="btn" style="padding:12px;">
        Entrar
      </button>
    </form>

  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
