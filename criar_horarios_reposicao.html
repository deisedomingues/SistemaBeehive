<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Inserir Horários de Reposição | Beehive</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <div class="overlay"></div>

    <main class="container">

        <h1>Inserir horários de reposição</h1>

        <p style="margin-bottom: 18px; opacity: 0.9;">
            Cadastre novos horários para que os alunos possam agendar suas reposições.
        </p>

        <form id="formHorario">

            <label for="professor">Professor</label>
            <select id="professor" required></select>
            <br><br>

            <label for="materia">Curso</label>
            <select id="materia" required></select>
            <br><br>

            <label for="data">Data</label>
            <input type="date" id="data" required>
            <br><br>

            <h4>Horários</h4>

            <div id="horariosContainer"></div>
            <br>

            <button type="button" id="addHorario" class="btn">
                + Adicionar horário
            </button>

            <br><br>

            <button type="submit" class="btn">Salvar horários</button>

        </form>

        <p id="msg"></p>

        <br>

        <a href="reposicoes.html" class="link-voltar">← Voltar para reposições</a>

    </main>

    <script type="module" src="js/criar_horarios_reposicao.js"></script>

</body>

</html>
