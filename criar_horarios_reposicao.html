<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Horários de Reposição | Beehive</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="overlay"></div>

    <main class="container">

        <h1>Horários de Reposição</h1>

        <h2>Novo horário</h2>

        <form id="formHorario">

            <label>Professor</label>
            <select id="professor" required></select>
              <br>
                <br>

            <label>Curso</label>
            <select id="materia"></select>
            
                <br>
                <br>
                
            <label>Data</label>
            <input type="date" id="data" required>
              <br>
                <br>

            <h4>Horários</h4>

            <div id="horariosContainer"></div>
              <br>

            <button type="button" id="addHorario" class="btn">
                + Adicionar horário
            </button>

            <br><br>

            <button class="btn">Salvar horários</button>
             <br> <br>
            <a href="home-admin.html" class="link-voltar">← Voltar</a>

        </form>

         <br>

        <h2>Horários de reposição</h2>

        <div id="listaReposicoes"></div>

        <p id="msg"></p>

        <br>

     
        <a href="home-admin.html" class="link-voltar">← Voltar</a>

    </main>
    

    <script type="module" src="js/criar_horarios_reposicao.js"></script>

</body>

</html>
