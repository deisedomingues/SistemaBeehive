<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastrar Professor | Beehive</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <div class="overlay"></div>

  <main class="container">
    <h1 style="margin-bottom:10px;">Cadastrar Professor</h1>

    <form class="form" id="form-professor">

      <label style="margin-bottom:8px;">
        Nome do professor
        <input
          type="text"
          id="nomeProfessor"
          placeholder="Ex: Gretha"
          required
          style="padding:8px;"
        >
      </label>

      <label style="margin-bottom:10px;">
        E-mail (para login)
        <input
          type="email"
          id="emailProfessor"
          placeholder="ex: gretha@beehive.com"
          required
          style="padding:8px;"
        >
      </label>

      <label style="margin-bottom:10px;">
        Data de nascimento
        <input
          type="date"
          id="dataNascimentoProfessor"
          style="padding:8px;"
        >
      </label>

      <hr style="margin: 6px 0 8px 0; border: none; border-top: 1px solid #eee;">

      <div
        style="
          margin: 8px 0 10px 0;
          padding: 10px 12px;
          border: 1px solid #f1d98a;
          border-left: 4px solid #F1BC32;
          border-radius: 10px;
          background: #fff8e8;
        "
      >
        <p style="margin:0; font-size:13px; line-height:1.45; color:#6b5200;">
          <strong>Matérias que leciona:</strong> marque abaixo as matérias que este professor pode lecionar e informe o valor/hora base de cada uma.
        </p>
        <p style="margin:8px 0 0 0; font-size:12px; line-height:1.45; color:#6b5200;">
          Aulas coletivas poderão ser calculadas automaticamente depois com acréscimo de 50%.
        </p>
      </div>

      <div
        id="listaMaterias"
        style="
          display:grid;
          gap:10px;
          margin-bottom:10px;
        "
      >
        <div style="opacity:0.8; font-size:13px;">Carregando matérias...</div>
      </div>

      <button type="submit" class="btn" style="padding:12px;">
        Salvar professor
      </button>
    </form>

    <div id="msg" style="display:none; margin-bottom:10px;"></div>

    <a href="home-admin.html" class="link-voltar" style="margin-top:10px;">← Voltar</a>
  </main>

  <script type="module" src="js/professores.js"></script>
</body>
</html>
