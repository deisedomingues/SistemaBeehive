<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Cadastrar Aluno | Beehive</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="overlay"></div>

  <main class="container">
    <h1 style="margin-bottom: 12px;">Cadastrar Aluno</h1>

    <!-- Mensagem de feedback -->
    <div id="msg" style="display:none; margin-bottom:8px;"></div>

    <form class="form" id="form-aluno">

      <!-- Dados do aluno -->
      <label style="margin-bottom:8px;">
        Nome completo do aluno
        <input
          type="text"
          id="nome"
          placeholder="Ex: Maria Silva"
          required
          style="padding:8px;"
        />
      </label>

      <label style="margin-bottom:8px;">
        Data de nascimento
        <input
          type="date"
          id="dataNascimento"
          required
          style="padding:8px;"
        />
      </label>

      <label style="margin-bottom:8px;">
        E-mail (opcional)
        <input
          type="email"
          id="email"
          placeholder="Ex: maria@email.com"
          style="padding:8px;"
          autocomplete="email"
        />
      </label>

      <label style="margin-bottom:10px;">
        Telefone (opcional)
        <input
          type="text"
          id="telefone"
          placeholder="Ex: (11) 99999-9999"
          style="padding:8px;"
          autocomplete="tel"
        />
      </label>

      <hr style="margin: 6px 0 8px 0; border: none; border-top: 1px solid #eee;">

      <!-- Cursos -->
      <h2 style="font-size:15px; text-align:left; margin-bottom:6px;">
        Cursos do aluno
      </h2>

      <div id="cursos"></div>

      <!-- Botão secundário -->
      <div style="text-align: right; margin: 4px 0 10px 0;">
        <button
          type="button"
          id="btnAddCurso"
          style="
            background-color: #FFF5CC;
            border: 1px solid #F1BC32;
            color: #000;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 11.5px;
            cursor: pointer;
          "
        >
          + adicionar outro curso
        </button>
      </div>

      <!-- Botão principal -->
      <button
        type="submit"
        class="btn"
        style="margin-top:6px; padding:12px;"
      >
        Salvar aluno
      </button>
    </form>

    <a href="home-admin.html" class="link-voltar" style="margin-top:10px;">
      ← Voltar
    </a>
  </main>

  <script type="module" src="js/alunos.js"></script>
</body>
</html>
